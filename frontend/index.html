<!DOCTYPE html>
<html>

<head>
  <title>FeedMe Orders</title>
  <style>
    #app {
      font-family: Avenir, Helvetica, Arial, sans-serif;
      text-align: center;
      color: #2c3e50;
      margin: 30px;
      display: grid;
      gap: 15px;
      justify-items: center;
    }

    button {
      background-color: #abc2f3;
      border: none;
      color: white;
      padding: 12px 25px;
      margin: 5px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background-color: #8faeea;
    }

    .error {
      color: red;
    }

    .loading {
      font-size: 18px;
      color: #666;
    }
  </style>
</head>

<body>
  <div id="app">
    <h2>FeedMe Order System</h2>

    <button v-on:click="addOrder">➕ Add Order</button>
    <button v-on:click="testScript">➕ Test Script</button>

    <div v-if="loading" class="loading">
      ⏳ Loading (Render cold start might takes 5-20 seconds...)
    </div>

    <div v-if="error" class="error">
      ❌ {{ error }}
    </div>

    <div v-if="!loading && orders.length === 0">
      No orders yet
    </div>

    <div v-for="order in orders" :key="order._id">
      Order {{ order._id }}
      <button v-on:click="deleteOrder(order._id)">Complete</button>
    </div>
  </div>

  <!-- axios -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <!-- Vue -->
  <script type="module">
    import Vue from "https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.esm.browser.js";

    // 🔥 改成你的 Render URL（你已经有了）
    const backendUrl = "https://feedme-backend-248b.onrender.com";

    const client = axios.create({
      baseURL: backendUrl,
    });

    new Vue({
      el: "#app",

      data: {
        orders: [],
        loading: true,
        error: null,
      },

      mounted: async function () {
        await this.loadOrder();
        this.loading = false;
      },

      methods: {
        loadOrder: async function () {
          try {
            const res = await client.get("/orders");
            this.orders = res.data;
            this.error = null;
          } catch (err) {
            console.log("Retrying...");
            setTimeout(this.loadOrder, 3000);
          }
        },

        addOrder: async function () {
          try {
            await client.post("/orders");
            this.loadOrder();
          } catch (err) {
            console.error(err);
            this.error = "Failed to add order";
          }
        },

        testScript: async function () {
          window.alert('test');
        },

          deleteOrder: async function (id) {
          try {
            await client.delete("/orders/" + id);
            this.loadOrder();
          } catch (err) {
            console.error(err);
            this.error = "Failed to delete order";
          }
        },
      },
    });
  </script>
</body>

</html>
